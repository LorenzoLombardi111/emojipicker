<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Emoji Picker - Copy & Paste Emojis | freeemojipicker.app</title>
<meta name="description" content="Free emoji picker. Search, browse and copy emojis instantly. No install required.">
<meta property="og:title" content="Free Emoji Picker">
<meta property="og:description" content="Search, browse and copy emojis instantly.">
<meta property="og:image" content="/og-image.svg">
<meta property="og:url" content="https://freeemojipicker.app">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#C49A2A">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f5f5f5;--surface2:#e8e8e8;--text:#1a1a1a;--text2:#666;
  --accent:#C49A2A;--accent-hover:#b08a24;--border:#e0e0e0;--shadow:0 1px 3px rgba(0,0,0,.08);
  --header-bg:#ffffff;--search-bg:#f5f5f5;--tab-bg:#f0f0f0;--tab-active-bg:#C49A2A;
  --tab-active-text:#fff;--grid-bg:#ffffff;--status-bg:#f9f9f9;--badge-bg:#f0ead6;--badge-text:#9a7b1e;
}
[data-theme="dark"]{
  --bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2a;--text:#e0e0e0;--text2:#999;
  --accent:#C49A2A;--accent-hover:#d4aa3a;--border:#333;--shadow:0 1px 3px rgba(0,0,0,.3);
  --header-bg:#1a1a1a;--search-bg:#1e1e1e;--tab-bg:#252525;--tab-active-bg:#C49A2A;
  --tab-active-text:#fff;--grid-bg:#121212;--status-bg:#1a1a1a;--badge-bg:#2a2310;--badge-text:#d4aa3a;
}
html{height:100%}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100%;display:flex;flex-direction:column;transition:background .3s,color .3s;
}

/* Header */
.header{
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:var(--header-bg);border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:100;
}
.header-logo{
  font-family:'Lora',serif;font-weight:600;font-size:18px;color:var(--accent);
  text-decoration:none;letter-spacing:-0.3px;
}
.theme-toggle{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:18px;transition:background .2s,border-color .2s;
}
.theme-toggle:hover{background:var(--surface2)}

/* Search */
.search-wrap{
  padding:16px 20px 12px;display:flex;justify-content:center;flex-shrink:0;
}
.search-box{
  width:100%;max-width:600px;position:relative;
}
.search-box svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:var(--text2);pointer-events:none;
}
.search-box input{
  width:100%;height:44px;padding:0 16px 0 42px;border-radius:10px;
  border:1px solid var(--border);background:var(--search-bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;
}
.search-box input::placeholder{color:var(--text2)}
.search-box input:focus{border-color:var(--accent)}

/* Category Tabs */
.categories-wrap{
  padding:0 20px;flex-shrink:0;display:flex;justify-content:center;
}
.categories{
  display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;max-width:600px;width:100%;
  scrollbar-width:none;-ms-overflow-style:none;
}
.categories::-webkit-scrollbar{display:none}
.cat-tab{
  display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;
  border:none;background:var(--tab-bg);color:var(--text);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  white-space:nowrap;transition:background .2s,color .2s;flex-shrink:0;
}
.cat-tab:hover{background:var(--surface2)}
.cat-tab.active{background:var(--tab-active-bg);color:var(--tab-active-text)}
.cat-tab .cat-icon{font-size:16px}

/* Emoji Grid */
.grid-area{
  flex:1;padding:8px 20px 20px;display:flex;justify-content:center;overflow-y:auto;
}
.emoji-grid{
  width:100%;max-width:600px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:4px;
  align-content:start;min-height:200px;
}

/* Status Bar */
.status-bar{
  height:32px;display:flex;align-items:center;justify-content:center;
  padding:0 20px;background:var(--status-bg);border-top:1px solid var(--border);
  flex-shrink:0;font-size:12px;color:var(--text2);gap:12px;
}

/* Badge */
.badge{
  position:fixed;bottom:44px;right:16px;z-index:99;
  background:var(--badge-bg);color:var(--badge-text);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:5px 10px;border-radius:6px;text-decoration:none;
  border:1px solid var(--accent);opacity:.85;transition:opacity .2s;
}
.badge:hover{opacity:1}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">freeemojipicker.app</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search emojis..." autocomplete="off">
  </div>
</div>

<div class="categories-wrap">
  <div class="categories" id="categoryTabs">
    <button class="cat-tab active" data-category="smileys"><span class="cat-icon">😀</span> Smileys</button>
    <button class="cat-tab" data-category="people"><span class="cat-icon">👋</span> People</button>
    <button class="cat-tab" data-category="animals"><span class="cat-icon">🐱</span> Animals</button>
    <button class="cat-tab" data-category="food"><span class="cat-icon">🍕</span> Food</button>
    <button class="cat-tab" data-category="activities"><span class="cat-icon">⚽</span> Activities</button>
    <button class="cat-tab" data-category="travel"><span class="cat-icon">✈️</span> Travel</button>
    <button class="cat-tab" data-category="objects"><span class="cat-icon">💡</span> Objects</button>
    <button class="cat-tab" data-category="symbols"><span class="cat-icon">❤️</span> Symbols</button>
    <button class="cat-tab" data-category="flags"><span class="cat-icon">🏁</span> Flags</button>
  </div>
</div>

<main class="grid-area">
  <div class="emoji-grid" id="emojiGrid">
    <!-- Emojis will be populated here -->
  </div>
</main>

<div class="status-bar">
  <span id="statusText">Select a category to browse emojis</span>
</div>

<a href="https://freesuite.app" target="_blank" rel="noopener" class="badge">by freesuite.app</a>

<script>
(function(){
  const THEME_KEY = 'suite_theme';
  const toggle = document.getElementById('themeToggle');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }

  const saved = localStorage.getItem(THEME_KEY);
  if (saved) {
    applyTheme(saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    applyTheme('dark');
  }

  toggle.addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  // Category tab switching
  const tabs = document.querySelectorAll('.cat-tab');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('statusText').textContent = 'Category: ' + tab.textContent.trim();
    });
  });
})();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
</script>
</body>
</html>
